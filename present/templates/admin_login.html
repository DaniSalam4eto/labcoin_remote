<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRESENT — Admin login</title>
  <style>
    :root {
      --bg: #f6efe2;
      --panel: #fbf6ea;
      --ink: #2b2b2b;
      --muted: #79716a;
      --accent: #d96d3b;
      --line: #e2d9c4;
      --shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 28px 28px 22px;
      width: min(420px, 90vw);
      box-shadow: var(--shadow);
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    p.muted { color: var(--muted); margin: 0 0 18px; font-size: 14px; }
    label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    input[type=password] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      font: inherit;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 11px 16px;
      border-radius: 999px;
      border: 0;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .err {
      background: #fde2d6;
      color: #843217;
      border: 1px solid #f0b497;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    a.back { display: inline-block; margin-top: 14px; color: var(--muted); font-size: 13px; text-decoration: none; }
    a.back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ url_for('admin_login') }}">
    <h1>Admin login</h1>
    <p class="muted">Enter the <code>PRESENT_TOKEN</code> set in <code>.env</code>.</p>
    {% if error %}
      <div class="err">Wrong token. Try again.</div>
    {% endif %}
    <label for="token">Admin token</label>
    <input id="token" type="password" name="token" autocomplete="current-password" autofocus>
    <button type="submit">Sign in</button>
    <a class="back" href="{{ url_for('index') }}">← Back to library</a>
  </form>
</body>
</html>
